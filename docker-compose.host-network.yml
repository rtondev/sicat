version: "3.9"

# Linux: use quando o MySQL do host só escuta em 127.0.0.1 (bind padrão).
# Uso: docker compose -f docker-compose.yml -f docker-compose.host-network.yml up --build -d
# No .env: DATABASE_URL=mysql+pymysql://USUARIO:SENHA@127.0.0.1:3306/sicat
# Com host network, a API fica em 0.0.0.0:7000 direto na VPS (sem mapeamento de porta).

services:
  backend:
    network_mode: host
    ports: []
    extra_hosts: []
