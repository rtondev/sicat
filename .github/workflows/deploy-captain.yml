name: Deploy Captain

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Captain build
        shell: bash
        env:
          CAPROVER_WEBHOOK_URL: ${{ secrets.CAPROVER_WEBHOOK_URL }}
        run: |
          set -e
          URL="$(printf '%s' "${CAPROVER_WEBHOOK_URL:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          if [ -z "$URL" ]; then
            echo "::error::Secret CAPROVER_WEBHOOK_URL vazio ou não definido neste repositório (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          case "$URL" in
            https://*) ;;
            http://*) ;;
            *)
              echo "::error::URL do webhook deve começar por https:// (verifica o que colaste no secret)."
              exit 1
              ;;
          esac
          curl -fsS -X POST "$URL"
