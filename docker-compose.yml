version: "3.9"

# MySQL roda no host da VPS (ex.: mesmo mysqld do fluxomed-api), outro DATABASE (ex.: sicat).
# No .env use host host.docker.internal na DATABASE_URL — exige extra_hosts abaixo (Linux).

services:
  backend:
    build:
      context: .
    container_name: sicat-backend
    env_file:
      - .env
    ports:
      - "7000:7000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
