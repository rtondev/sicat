version: "3.9"

# API em container; MySQL no host (ex.: mesmo mysqld da VPS, database separado, ex.: sicat).
# DATABASE_URL no .env: host host.docker.internal (extra_hosts abaixo aponta para o host no Linux).

services:
  backend:
    build:
      context: .
    container_name: sicat-backend
    env_file:
      - .env
    ports:
      - "7000:7000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
