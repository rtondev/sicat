version: "3.9"

# Opcional: stack completo (MySQL + phpMyAdmin + API) para máquina sem MySQL local.
# Uso: docker compose -f docker-compose.bundled-mysql.yml up --build -d
# No .env: DATABASE_URL=mysql+pymysql://sicat_user:sicat_password@db:3306/sicat

services:
  db:
    image: mysql:8.0
    container_name: sicat-db
    environment:
      MYSQL_DATABASE: sicat
      MYSQL_USER: sicat_user
      MYSQL_PASSWORD: sicat_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: .
    container_name: sicat-backend
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "7000:7000"
    environment:
      DATABASE_URL: mysql+pymysql://sicat_user:sicat_password@db:3306/sicat

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: sicat-phpmyadmin
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: sicat_user
      PMA_PASSWORD: sicat_password
    ports:
      - "8080:80"

volumes:
  db_data:
